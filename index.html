<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hot Tub Log - Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f0f9ff; }
        .glass-card { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .btn-active:active { transform: scale(0.95); }
    </style>
</head>
<body class="bg-blue-50">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const SUPABASE_URL = "https://lzdiozffnypzkxvnygyx.supabase.co";
        const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imx6ZGlvemZmbnlwemt4dm55Z3l4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODQ1OTU3MjMsImV4cCI6MjEwMDE3MTcyM30.sif9qw0LrKrn1lBS6sEkBNn3llEuaVHNgQxZA2mc4RI";

        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        function HotTubApp() {
            const [logs, setLogs] = useState([]);
            const [rules, setRules] = useState([]);
            const [note, setNote] = useState("");
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [selectedTask, setSelectedTask] = useState("");
            const [isEditing, setIsEditing] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [editDate, setEditDate] = useState(new Date().toISOString().split('T')[0]);
            const [loading, setLoading] = useState(true);
            const [isSaving, setIsSaving] = useState(false);
            
            // Settings State
            const [settingsModalOpen, setSettingsModalOpen] = useState(false);

            useEffect(() => {
                async function fetchData() {
                    const { data: logData, error: logErr } = await supabase.from('logs').select('*').order('created_at', { ascending: false });
                    const { data: ruleData, error: ruleErr } = await supabase.from('maintenance_rules').select('*');
                    
                    if (!logErr) setLogs(logData || []);
                    if (!ruleErr) setRules(ruleData || []);
                    setLoading(false);
                }
                fetchData();
            }, []);

            const tasks = [
                { id: 'A', label: 'Test and Balance Water', color: 'bg-blue-600' },
                { id: 'B', label: 'Clean Filter', color: 'bg-cyan-600' },
                { id: 'C', label: 'Add Water', color: 'bg-sky-600' },
                { id: 'D', label: 'Drain and Refill', color: 'bg-indigo-600' }
            ];

            const getDaysRemaining = (taskLabel) => {
                const rule = rules.find(r => r.task_type === taskLabel);
                if (!rule || rule.enabled === false) return null;

                const lastLog = logs.find(l => l.task_type === taskLabel);
                if (!lastLog) return rule.interval_days;

                const lastDate = new Date(lastLog.created_at);
                const diffDays = Math.ceil(Math.abs(new Date() - lastDate) / (1000 * 60 * 60 * 24));
                return rule.interval_days - diffDays;
            };

            const handleButtonClick = (task) => {
                setSelectedTask(task.label);
                setNote("");
                setEditDate(new Date().toISOString().split('T')[0]);
                setIsEditing(false);
                setEditingId(null);
                setIsModalOpen(true);
            };

            const handleEditClick = (log) => {
                setIsEditing(true);
                setEditingId(log.id);
                setSelectedTask(log.task_type);
                setNote(log.note || "");
                setEditDate(log.created_at.split('T')[0]);
                setIsModalOpen(true);
            };

            const submitLog = async () => {
                setIsSaving(true);
                try {
                    if (isEditing && editingId) {
                        await supabase
                            .from('logs')
                            .update({ 
                                task_type: selectedTask, 
                                note: note, 
                                created_at: new Date(editDate) 
                            })
                            .eq('id', editingId);
                    } else {
                        await supabase
                            .from('logs')
                            .insert([{ 
                                task_type: selectedTask, 
                                note: note, 
                                created_at: new Date(editDate),
                                id: crypto.randomUUID() 
                             }]);
                    }
                    
                    setIsModalOpen(false);
                    setNote("");
                    setIsEditing(false);
                    setEditingId(null);
                    await fetchData(); 
                } catch (error) {
                    alert("Error saving to cloud: " + error.message);
                } finally {
                    setIsSaving(false);
                }
            };

            const deleteLog = async (id) => {
                if(confirm("Delete this log?")) {
                    try {
                        await supabase.from('logs').delete().eq('id', id);
                        await fetchData();
                    } catch (e) {
                        alert("Error deleting: " + e.message);
                    }
                }
            }

            // Save settings to Supabase
            const saveSettings = async () => {
                setIsSaving(true);
                try {
                    const { error } = await supabase.from('maintenance_rules').upsert(rules);
                    if (error) throw error;
                    await fetchData();
                    setSettingsModalOpen(false);
                } catch (error) {
                    alert("Error saving settings: " + error.message);
                } finally {
                    setIsSaving(false);
                }
            };

            if (loading) return <div className="flex h-screen items-center justify-center text-blue-900 font-bold">Loading App...</div>;

            return (
                <div className="min-h-screen p-4 max-w-md mx-auto pb-24">
                    <header className="mb-8 pt-4 flex justify-between items-start">
                        <div>
                            <h1 className="text-3xl font-bold text-blue-900">Hot Tub Log</h1>
                            <p className="text-blue-600">Smart Maintenance</p>
                        </div>
                        <div className="text-right">
                            <button 
                                onClick={() => setSettingsModalOpen(true)}
                                className="bg-blue-100 p-2 rounded-full mb-2 hover:bg-blue-200 transition-colors"
                            >
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M12.22 2h-.44a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2V6z"></path><path d="M18 15a3 3 0 0 1-3 3l-2.7-2.7a1 1 0 0 0-1.4 1.4L14.5 18l-4-4a1 1 0 0 0-1.4 1.4L12 20a3 3 0 0 1-3-3l3.3-3.3a1 1 0 0 1 1.4 1.4L11 17l3-3a1 1 0 0 1 1.4 1.4L12 18l2.8-2.8a1 1 0 0 1 1.4 1.4l-3.3 3.3a3 3 0 0 1-3-3l3.3-3.3a1 1 0 0 1 1.4-1.4L18 15z"></path><path d="M12 18H4"></path><path d="M12 18v-6"></path><path d="M12 18l-4-4"></path><path d="M12 18l4-4"></path></svg>
                            </button>
                            <span className="text-[10px] font-bold text-gray-400">2024.07.20</span>
                        </div>
                    </header>

                    <div className="grid grid-cols-1 gap-4 mb-8">
                        {tasks.map((task) => {
                            const daysLeft = getDaysRemaining(task.label);
                            const isOverdue = daysLeft !== null && daysLeft <= 0;
                            return (
                                <button
                                    key={task.id}
                                    onClick={() => handleButtonClick(task)}
                                    className={`${task.color} text-white p-4 rounded-2xl shadow-lg active:scale-95 transition-transform font-bold text-lg flex justify-between items-center btn-active`}
                                    style={{ backgroundColor: isOverdue ? '#ef4444' : undefined }}
                                >
                                    <span>{task.label}</span>
                                    {daysLeft !== null && (
                                        <span className={`text-xs px-2 py-1 rounded-full ${isOverdue ? 'bg-white text-red-600' : 'bg-white bg-opacity-20'}`}>
                                            {isOverdue ? "OVERDUE" : `${daysLeft} days left`}
                                        </span>
                                    )}
                                </button>
                            );
                        })}
                    </div>

                    <div className="glass-card rounded-3xl p-6 shadow-xl">
                        <h2 className="text-xl font-bold text-blue-900 mb-4">Recent Activity</h2>
                        {logs.length === 0 ? (
                            <p className="text-gray-400 italic">No logs yet.</p>
                        ) : (
                            <div className="space-y-6">
                                {logs.map((log) => (
                                    <div key={log.id} className="border-b border-blue-100 pb-4 last:border-0">
                                        <div className="flex justify-between items-start">
                                            <div>
                                                <span className="font-bold text-blue-800">{log.task_type}</span>
                                                <span className="block text-xs text-gray-500">{new Date(log.created_at).toLocaleDateString()}</span>
                                            </div>
                                            <div className="flex gap-2">
                                                <button onClick={() => handleEditClick(log)} className="text-blue-500 text-sm font-semibold">Edit</button>
                                                <button onClick={() => deleteLog(log.id)} className="text-gray-400 text-sm">✕</button>
                                            </div>
                                        </div>
                                        {log.note && <p className="text-sm text-gray-600 mt-2 bg-blue-50 p-2 rounded-lg">"{log.note}"</p>}
                                        <p className="text-[10px] text-gray-400 mt-2">{new Date(log.created_at).toLocaleString()}</p>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Log Entry Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-6 z-50 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl">
                                <h3 className="text-xl font-bold mb-4 text-blue-900">{isEditing ? "Edit Log" : "New Log Entry"}</h3>
                                <div className="space-y-4">
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 mb-1">Activity</label>
                                        <select 
                                            className="w-full p-3 border-2 border-blue-100 rounded-xl focus:border-blue-400 outline-none"
                                            value={selectedTask}
                                            onChange={(e) => setSelectedTask(e.target.value)}
                                        >
                                            {tasks.map(t => <option key={t.id} value={t.label}>{t.label}</option>)}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 mb-1">Date</label>
                                        <input 
                                            type="date"
                                            className="w-full p-3 border-2 border-blue-100 rounded-xl focus:border-blue-400 outline-none"
                                            value={editDate}
                                            onChange={(e) => setEditDate(e.target.value)}
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-500 mb-1">Notes (Optional)</label>
                                        <textarea
                                            className="w-full p-3 border-2 border-blue-100 rounded-xl focus:border-blue-400 outline-none"
                                            placeholder="Add details..."
                                            rows="3"
                                            value={note}
                                            onChange={(e) => setNote(e.target.value)}
                                        />
                                    </div>
                                </div>
                                <div className="flex gap-3 mt-6">
                                    <button onClick={() => setIsModalOpen(false)} className="flex-1 py-3 bg-gray-100 rounded-xl font-bold text-gray-600">Cancel</button>
                                    <button 
                                        onClick={submitLog} 
                                        disabled={isSaving}
                                        className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg disabled:bg-blue-300"
                                    >
                                        {isSaving ? "Saving..." : isEditing ? "Update" : "Save Log"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Settings Modal */}
                    {settingsModalOpen && (
                        <div className="fixed inset-0 bg-black bg-opacity-60 flex items-center justify-center p-6 z-50 backdrop-blur-sm">
                            <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl">
                                <h3 className="text-xl font-bold mb-4 text-blue-900">Maintenance Settings</h3>
                                <div className="space-y-6">
                                    {rules.map((rule, index) => (
                                        <div key={index} className="flex flex-col gap-2 border-b pb-4 last:border-0">
                                            <div className="flex justify-between items-center">
                                                <span className="font-bold text-blue-800">{rule.task_type}</span>
                                                <button 
                                                    onClick={() => {
                                                        const newRules = [...rules];
                                                        newRules[index].enabled = !newRules[index].enabled;
                                                        setRules(newRules);
                                                    }}
                                                    className={`text-xs px-2 py-1 rounded-full ${rules[index].enabled ? 'bg-green-100 text-green-700' : 'bg-gray-100 text-gray-700'}`}
                                                >
                                                    {rules[index].enabled ? "Enabled" : "Disabled"}
                                                </button>
                                            </div>
                                            <div className="flex items-center gap-4">
                                                <label className="text-xs text-gray-500">Interval (Days):</label>
                                                <input 
                                                    type="number" 
                                                    className="w-20 p-1 border rounded"
                                                    value={rule.interval_days}
                                                    onChange={(e) => {
                                                        const newRules = [...rules];
                                                        newRules[index].interval_days = parseInt(e.target.value);
                                                        setRules(newRules);
                                                    }}
                                                />
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="flex gap-3 mt-6">
                                    <button onClick={() => setSettingsModalOpen(false)} className="flex-1 py-3 bg-gray-100 rounded-xl font-bold text-gray-600">Cancel</button>
                                    <button 
                                        onClick={saveSettings} 
                                        disabled={isSaving}
                                        className="flex-1 py-3 bg-blue-600 text-white rounded-xl font-bold shadow-lg disabled:bg-blue-300"
                                    >
                                        {isSaving ? "Saving..." : "Save Settings"}
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<HotTubApp />);
    </script>
</body>
</html>
